<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wild Hearts</title>

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<header>

    <div class="logo">
        WILD HEARTS
    </div>

    <nav>
        <a href="#">Home</a>
        <a href="#">Adopt</a>
        <a href="#">Animals</a>
        <a href="#">Impact</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
    </nav>

    <button class="btn">
        Adopt Now
    </button>

</header>

<section class="hero">

    <div class="content">
        <h1>WILD HEARTS</h1>

        <h3>Gift From The Wild Campaign</h3>

        <p>
            Adopt an animal to release.
        </p>
    </div>

</section>

<section class="cards">

    <div class="card">
        <i class="fa-regular fa-heart"></i>
        <h4>Adopt Animal</h4>
    </div>

    <div class="card">
        <i class="fa-solid fa-plus"></i>
        <h4>Heal Animal</h4>
    </div>

    <div class="card">
        <i class="fa-solid fa-location-dot"></i>
        <h4>Release Animal</h4>
    </div>

</section>

<script src="script.js"></script>

</body>
</html>
